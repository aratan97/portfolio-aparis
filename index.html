<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthur PARIS — Intégrateur Web</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/bootstrap.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top custom-navbar" id="navbar">
    <div class="container">
        <a class="navbar-brand nav-logo-link d-flex align-items-center" href="#hero">
            <img src="img/logo_ap.svg" alt="Arthur PARIS - Logo Intégrateur Web" class="img-fluid nav-logo-img">
        </a>

        <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav gap-lg-4">
                <li class="nav-item">
                    <a class="nav-link" href="#inventaire">Inventaire</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#quetes">Quêtes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#lore">Lore</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#guilde">Guilde</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!--header-->

<section id="hero" class="d-flex flex-column justify-content-center align-items-center text-center position-relative min-vh-100 container-fluid px-0">

    <div class="moon"></div>

    <div class="avatar-container position-relative mb-4">
        <div class="avatar-glow"></div>
        <img src="img/icon-test.png" alt="Avatar Arthur PARIS" class="avatar img-fluid position-relative">
    </div>

    <p class="pixel-text hero-eyebrow mb-3">Front-End Developer ✦ Artisan Drupal</p>
    <h1 class="hero-name mb-3">Arthur PARIS</h1>
    <p class="hero-title mb-5 px-3">Bâtisseur d'interfaces robustes & Forgeron de code propre.</p>

    <div class="hero-ctas d-flex gap-3 justify-content-center flex-wrap position-relative z-1 mb-5">
        <a href="#inventaire" class="btn btn-primary d-flex align-items-center gap-2">
            <img src="img/icon-test.png" alt="Icone Arsenal" class="btn-icon">
            Découvrir mon arsenal
        </a>
        <a href="#guilde" class="btn btn-secondary d-flex align-items-center gap-2">
            <img src="img/icon-test.png" alt="Icone Requête" class="btn-icon">
            Lancer une requête
        </a>
    </div>

    <div class="mountains position-absolute bottom-0 start-0 w-100">
        <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" class="w-100 h-100">
            <polygon points="0,200 0,150 1440,150 1440,200" fill="#0c1119" opacity="0.8"/>
            <polygon points="0,200 0,180 1440,180 1440,200" fill="#080c13"/>
        </svg>
    </div>
</section>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/custom.js"></script>
